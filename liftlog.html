<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lift Log" />
  <meta name="theme-color" content="#0e0e12" />
  <title>Lift Log</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e12;
      --card: #17171e;
      --border: #2a2a35;
      --accent: #c8f135;
      --accent-dim: #8faa25;
      --text: #eeeee6;
      --muted: #6b6b80;
      --danger: #ff4d6d;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', 'Courier New', monospace;
      min-height: 100vh;
      overscroll-behavior: none;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input { -webkit-appearance: none; border-radius: 0; }
    ::-webkit-scrollbar { display: none; }
    select { -webkit-appearance: none; }

    #app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
    }

    /* TOAST */
    #toast {
      position: fixed;
      top: 56px;
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: var(--accent);
      color: #0e0e12;
      padding: 9px 22px;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.05em;
      z-index: 999;
      border-radius: 2px;
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(200,241,53,0.35);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* HEADER */
    header {
      padding: 52px 24px 20px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 44px;
      letter-spacing: 0.08em;
      color: var(--accent);
      line-height: 1;
    }
    header p {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.12em;
      margin-top: 4px;
    }

    /* TABS */
    nav {
      display: flex;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
    }
    nav button {
      flex: 1;
      padding: 13px 0;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    nav button.active {
      background: var(--accent);
      color: #0e0e12;
    }

    /* PANELS */
    .panel { display: none; padding: 24px; padding-bottom: 60px; }
    .panel.active { display: block; }

    /* LABEL */
    .label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* EXERCISE CHIPS */
    #chip-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .chip {
      padding: 8px 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }
    .chip.selected {
      border-color: var(--accent);
      background: rgba(200,241,53,0.1);
      color: var(--accent);
    }
    .chip-add {
      border-style: dashed !important;
    }

    /* ADD EXERCISE ROW */
    #add-ex-row {
      display: none;
      gap: 8px;
      margin-top: 4px;
      margin-bottom: 12px;
    }
    #add-ex-row.show { display: flex; }
    #add-ex-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 10px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
    }
    #add-ex-btn {
      background: var(--accent);
      border: none;
      color: #0e0e12;
      padding: 10px 18px;
      font-family: 'DM Mono', monospace;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }

    /* LAST LOGGED PILL */
    #last-logged {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 12px 16px;
      margin-bottom: 20px;
      border-radius: 2px;
      display: none;
      justify-content: space-between;
      align-items: center;
    }
    #last-logged.show { display: flex; }
    #last-logged .ll-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
    #last-logged .ll-value { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: var(--accent); letter-spacing: 0.05em; }

    /* INPUTS ROW */
    .inputs-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .input-group { display: flex; flex-direction: column; }
    .input-group.big { flex: 2; }
    .input-group.small { flex: 1; }
    .big-input {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      outline: none;
      letter-spacing: 0.05em;
      text-align: center;
      width: 100%;
      transition: border-color 0.15s;
    }
    .big-input:focus { border-color: var(--accent); }

    /* QUICK ADJUST */
    .quick-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .quick-btn {
      flex: 1;
      padding: 11px 0;
      background: var(--card);
      border: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
    }
    .quick-btn.pos { color: var(--accent); }
    .quick-btn.neg { color: var(--muted); }
    .quick-btn:active { transform: scale(0.96); }

    /* LOG BUTTON */
    #log-btn {
      width: 100%;
      padding: 18px;
      background: var(--accent);
      border: none;
      color: #0e0e12;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 0.15em;
      cursor: pointer;
      border-radius: 2px;
      transition: opacity 0.15s, transform 0.1s;
    }
    #log-btn:active { transform: scale(0.98); opacity: 0.9; }

    /* RECENT LIST */
    .section-title {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin: 28px 0 12px;
    }
    .entry-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .entry-date { color: var(--muted); font-size: 12px; }
    .entry-weight {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 0.05em;
    }
    .entry-weight.pb { color: var(--accent); }
    .del-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .pb-badge {
      font-size: 10px;
      color: var(--accent-dim);
      letter-spacing: 0.1em;
    }

    /* PB CARD */
    .pb-card {
      background: var(--card);
      border: 1px solid rgba(200,241,53,0.3);
      padding: 16px 20px;
      margin-bottom: 20px;
      border-radius: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pb-card .pb-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 44px;
      color: var(--accent);
      letter-spacing: 0.05em;
      line-height: 1;
    }
    .pb-card .pb-lbl {
      font-size: 10px;
      color: var(--accent-dim);
      letter-spacing: 0.15em;
      margin-bottom: 4px;
    }
    .pb-trophy { font-size: 38px; }

    /* HISTORY SELECT */
    .styled-select {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      outline: none;
      border-radius: 2px;
      margin-bottom: 20px;
      cursor: pointer;
    }

    /* SUMMARY CARDS */
    .summary-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .summary-card:active { border-color: var(--accent); }
    .summary-card .ex-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .summary-card .ex-meta { font-size: 11px; color: var(--muted); }
    .summary-card .ex-meta span { color: var(--accent-dim); }
    .summary-card .ex-weight {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-align: right;
    }
    .summary-card .ex-date { font-size: 11px; color: var(--muted); text-align: right; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 60px 0;
      font-size: 13px;
      line-height: 2;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="toast"></div>

  <header>
    <h1>LIFT LOG</h1>
    <p>TRACK · PROGRESS · CRUSH IT</p>
  </header>

  <nav>
    <button class="active" onclick="switchTab('log')">LOG SET</button>
    <button onclick="switchTab('history')">HISTORY</button>
    <button onclick="switchTab('summary')">SUMMARY</button>
  </nav>

  <!-- LOG PANEL -->
  <div class="panel active" id="panel-log">
    <div class="label">EXERCISE</div>
    <div id="chip-container"></div>
    <div id="add-ex-row">
      <input id="add-ex-input" type="text" placeholder="Exercise name…" />
      <button id="add-ex-btn" onclick="confirmAddExercise()">OK</button>
    </div>

    <div id="last-logged">
      <span class="ll-label">LAST LOGGED</span>
      <span class="ll-value" id="last-logged-val"></span>
    </div>

    <div class="inputs-row">
      <div class="input-group big">
        <div class="label">WEIGHT (KG)</div>
        <input class="big-input" type="number" inputmode="decimal" id="weight-input" placeholder="0.0" />
      </div>
      <div class="input-group small">
        <div class="label">REPS</div>
        <input class="big-input" type="number" inputmode="numeric" id="reps-input" placeholder="—" />
      </div>
    </div>

    <div class="quick-row">
      <button class="quick-btn neg" onclick="adjustWeight(-5)">−5</button>
      <button class="quick-btn neg" onclick="adjustWeight(-2.5)">−2.5</button>
      <button class="quick-btn pos" onclick="adjustWeight(2.5)">+2.5</button>
      <button class="quick-btn pos" onclick="adjustWeight(5)">+5</button>
    </div>

    <button id="log-btn" onclick="logSet()">LOG SET</button>

    <div class="section-title" id="recent-title" style="display:none"></div>
    <div id="recent-list"></div>
  </div>

  <!-- HISTORY PANEL -->
  <div class="panel" id="panel-history">
    <div class="label">SELECT EXERCISE</div>
    <select class="styled-select" id="history-select" onchange="renderHistory()"></select>
    <div id="pb-card-container"></div>
    <div id="history-list"></div>
  </div>

  <!-- SUMMARY PANEL -->
  <div class="panel" id="panel-summary">
    <div class="label">ALL EXERCISES — LATEST WEIGHT</div>
    <div id="summary-list"></div>
  </div>
</div>

<script>
  const DEFAULT_EXERCISES = [
    "Bench Press","Squat","Deadlift","Overhead Press",
    "Barbell Row","Pull-Up","Bicep Curl","Tricep Pushdown",
    "Leg Press","Lat Pulldown"
  ];

  let exercises = JSON.parse(localStorage.getItem('ll-exercises') || 'null') || [...DEFAULT_EXERCISES];
  let log = JSON.parse(localStorage.getItem('ll-log') || '{}');
  let selectedExercise = exercises[0];

  function save() {
    localStorage.setItem('ll-log', JSON.stringify(log));
    localStorage.setItem('ll-exercises', JSON.stringify(exercises));
  }

  // TOAST
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // TABS
  function switchTab(tab) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    const idx = ['log','history','summary'].indexOf(tab);
    document.querySelectorAll('nav button')[idx].classList.add('active');
    if (tab === 'history') { populateHistorySelect(); renderHistory(); }
    if (tab === 'summary') renderSummary();
  }

  // CHIPS
  function renderChips() {
    const container = document.getElementById('chip-container');
    container.innerHTML = '';
    exercises.forEach(ex => {
      const btn = document.createElement('button');
      btn.className = 'chip' + (ex === selectedExercise ? ' selected' : '');
      btn.textContent = ex;
      btn.onclick = () => { selectedExercise = ex; renderChips(); renderLastLogged(); renderRecentList(); };
      container.appendChild(btn);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'chip chip-add';
    addBtn.textContent = '+ ADD';
    addBtn.onclick = () => {
      const row = document.getElementById('add-ex-row');
      row.classList.toggle('show');
      if (row.classList.contains('show')) document.getElementById('add-ex-input').focus();
    };
    container.appendChild(addBtn);
  }

  function confirmAddExercise() {
    const input = document.getElementById('add-ex-input');
    const name = input.value.trim();
    if (!name) return;
    if (!exercises.includes(name)) exercises.push(name);
    selectedExercise = name;
    input.value = '';
    document.getElementById('add-ex-row').classList.remove('show');
    save();
    renderChips();
    renderLastLogged();
    renderRecentList();
    showToast('Added "' + name + '" ✓');
  }

  // LAST LOGGED
  function renderLastLogged() {
    const entries = log[selectedExercise] || [];
    const el = document.getElementById('last-logged');
    const val = document.getElementById('last-logged-val');
    if (entries.length) {
      const e = entries[0];
      val.textContent = e.kg + ' KG' + (e.reps ? ' × ' + e.reps : '');
      el.classList.add('show');
    } else {
      el.classList.remove('show');
    }
  }

  // ADJUST WEIGHT
  function adjustWeight(delta) {
    const input = document.getElementById('weight-input');
    const cur = parseFloat(input.value) || 0;
    const next = Math.max(0, cur + delta);
    input.value = Number.isInteger(next) ? next : next.toFixed(1);
  }

  // LOG SET
  function logSet() {
    const weightInput = document.getElementById('weight-input');
    const repsInput = document.getElementById('reps-input');
    const kg = parseFloat(weightInput.value);
    if (!weightInput.value || isNaN(kg) || kg <= 0) { showToast('Enter a valid weight ⚠️'); return; }
    const entry = {
      kg,
      reps: repsInput.value ? parseInt(repsInput.value) : null,
      date: new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short' }),
      full: new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }),
      ts: Date.now()
    };
    if (!log[selectedExercise]) log[selectedExercise] = [];
    log[selectedExercise].unshift(entry);
    save();
    weightInput.value = '';
    repsInput.value = '';
    renderLastLogged();
    renderRecentList();
    showToast('Logged ' + kg + 'kg' + (entry.reps ? ' × ' + entry.reps : '') + ' ✓');
  }

  // RECENT LIST
  function renderRecentList() {
    const entries = (log[selectedExercise] || []).slice(0, 5);
    const title = document.getElementById('recent-title');
    const list = document.getElementById('recent-list');
    if (!entries.length) { title.style.display = 'none'; list.innerHTML = ''; return; }
    title.style.display = 'block';
    title.textContent = 'RECENT — ' + selectedExercise.toUpperCase();
    list.innerHTML = entries.map(e => `
      <div class="entry-row">
        <span class="entry-date">${e.date}</span>
        <span class="entry-weight">${e.kg} KG${e.reps ? ' × ' + e.reps : ''}</span>
        <button class="del-btn" onclick="deleteEntry('${selectedExercise}',${e.ts})">×</button>
      </div>`).join('');
  }

  function deleteEntry(ex, ts) {
    log[ex] = (log[ex] || []).filter(e => e.ts !== ts);
    save();
    renderRecentList();
    renderLastLogged();
    if (document.getElementById('panel-history').classList.contains('active')) renderHistory();
    if (document.getElementById('panel-summary').classList.contains('active')) renderSummary();
  }

  // HISTORY
  function populateHistorySelect() {
    const sel = document.getElementById('history-select');
    const cur = sel.value || selectedExercise;
    sel.innerHTML = exercises.map(ex => `<option value="${ex}" ${ex===cur?'selected':''}>${ex}</option>`).join('');
  }

  function renderHistory() {
    const ex = document.getElementById('history-select').value;
    const entries = log[ex] || [];
    const pb = entries.length ? Math.max(...entries.map(e => e.kg)) : null;

    const pbContainer = document.getElementById('pb-card-container');
    pbContainer.innerHTML = pb ? `
      <div class="pb-card">
        <div>
          <div class="pb-lbl">PERSONAL BEST</div>
          <div class="pb-num">${pb} KG</div>
        </div>
        <div class="pb-trophy">🏆</div>
      </div>` : '';

    const list = document.getElementById('history-list');
    if (!entries.length) {
      list.innerHTML = '<div class="empty">No entries yet.<br/>Go log a set!</div>';
      return;
    }
    list.innerHTML = `
      <div class="section-title">ALL ENTRIES (${entries.length})</div>` +
      entries.map(e => `
      <div class="entry-row" style="${e.kg===pb?'background:rgba(200,241,53,0.05)':''}">
        <div>
          <div class="entry-date">${e.full}</div>
          ${e.kg===pb ? '<div class="pb-badge">PB 🏆</div>' : ''}
        </div>
        <span class="entry-weight ${e.kg===pb?'pb':''}">${e.kg} KG${e.reps?' × '+e.reps:''}</span>
        <button class="del-btn" onclick="deleteEntry('${ex}',${e.ts})">×</button>
      </div>`).join('');
  }

  // SUMMARY
  function renderSummary() {
    const list = document.getElementById('summary-list');
    const active = exercises.filter(ex => log[ex]?.length);
    if (!active.length) {
      list.innerHTML = '<div class="empty">Nothing logged yet.<br/>Start tracking!</div>';
      return;
    }
    list.innerHTML = active.map(ex => {
      const entries = log[ex];
      const latest = entries[0];
      const best = Math.max(...entries.map(e => e.kg));
      return `<div class="summary-card" onclick="goHistory('${ex}')">
        <div>
          <div class="ex-name">${ex}</div>
          <div class="ex-meta">${entries.length} set${entries.length!==1?'s':''} · PB: <span>${best} kg</span></div>
        </div>
        <div>
          <div class="ex-weight">${latest.kg} KG</div>
          <div class="ex-date">${latest.date}</div>
        </div>
      </div>`;
    }).join('');
  }

  function goHistory(ex) {
    switchTab('history');
    document.getElementById('history-select').value = ex;
    renderHistory();
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.activeElement.id === 'add-ex-input') confirmAddExercise();
      else if (['weight-input','reps-input'].includes(document.activeElement.id)) logSet();
    }
  });

  // INIT
  renderChips();
  renderLastLogged();
  renderRecentList();
</script>
</body>
</html>
